{% extends 'dashboard/base_dashboard.html' %}
{% block page_title %}Crime Time Analysis{% endblock %}

{% block dashboard_content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <div class="icon-box" style="background:rgba(26,86,255,.08);"><i class="bi bi-clock-history text-accent fs-5"></i></div>
  <div><h5 class="fw-bold mb-0">Crime Time Analysis</h5><small class="text-muted">{{ area.name }}, {{ area.city }}</small></div>
  <a href="{% url 'dashboard:area_detail' area.id %}" class="btn btn-sm btn-outline-secondary ms-auto">← Back</a>
</div>

<div class="row g-4">
  <div class="col-md-6">
    <div class="card p-4"><h6 class="fw-bold mb-3">By Day of Week</h6><div style="height:220px;"><canvas id="dayChart"></canvas></div></div>
  </div>
  <div class="col-md-6">
    <div class="card p-4"><h6 class="fw-bold mb-3">By Hour of Day</h6><div style="height:220px;"><canvas id="hourChart"></canvas></div></div>
  </div>
  <div class="col-md-6">
    <div class="card p-4"><h6 class="fw-bold mb-3">By Month</h6><div style="height:220px;"><canvas id="monthChart"></canvas></div></div>
  </div>
  <div class="col-md-6">
    <div class="card p-4">
      <h6 class="fw-bold mb-3">Peak Analysis</h6>
      <div id="peakStats" class="d-flex flex-column gap-3"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
fetch('{% url "dashboard:time_analysis_data" area.id %}')
.then(r=>r.json())
.then(d=>{
  const opts = {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:10}}},x:{ticks:{font:{size:9}}}}};

  new Chart(document.getElementById('dayChart'),{type:'bar',data:{labels:d.days,datasets:[{data:d.day_counts,backgroundColor:d.day_counts.map(v=>`rgba(26,86,255,${0.2+v/Math.max(...d.day_counts)*0.7})`),borderRadius:5}]},options:opts});

  new Chart(document.getElementById('hourChart'),{type:'line',data:{labels:[...Array(24).keys()].map(h=>`${h}:00`),datasets:[{data:d.hourly,borderColor:'#EF4444',backgroundColor:'rgba(239,68,68,.08)',fill:true,tension:.4,pointRadius:2}]},options:opts});

  new Chart(document.getElementById('monthChart'),{type:'bar',data:{labels:d.months,datasets:[{data:d.month_counts,backgroundColor:'rgba(0,196,140,.5)',borderColor:'#00C48C',borderWidth:1,borderRadius:5}]},options:opts});

  document.getElementById('peakStats').innerHTML=`
    <div class="p-3 rounded-3" style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);">
      <div class="fw-semibold small mb-1">⚠️ Most Dangerous Time</div>
      <div class="text-muted" style="font-size:.8rem;">Day: <b>${d.peak_day}</b> · Hour: <b>${d.peak_hour}</b> · Month: <b>${d.peak_month}</b></div>
    </div>
    <div class="p-3 rounded-3" style="background:rgba(0,196,140,.06);border:1px solid rgba(0,196,140,.15);">
      <div class="fw-semibold small mb-1">✅ Safest Time to Travel</div>
      <div class="text-muted" style="font-size:.8rem;">Day: <b>${d.safest_day}</b> · Hour: <b>${d.safest_hour}</b></div>
    </div>`;
});
</script>
{% endblock %}
